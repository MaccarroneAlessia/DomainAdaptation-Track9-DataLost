program: python experiments/run_sweep.py
method: bayes
metric:
  goal: maximize
  name: eval/acc_head_tgt
parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3
  lambda_adv:
    distribution: uniform
    min: 0.05
    max: 1.0
  batch_size:
    values: [4, 8, 16]
  lambda_pseudo:
    distribution: uniform
    min: 0.05
    max: 0.5
  temperature:
    values: [0.1, 0.2, 0.5, 1.0]
  ema_momentum:
    values: [0.9, 0.95, 0.99]
  max_epochs:
    value: 3
