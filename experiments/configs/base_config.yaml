# base_config.yaml — configurazione condivisa da tutti gli esperimenti

# --- Percorsi (adattati al cluster DMI) --------------------------------------
paths:
  data_root:   "../../data"          # relativo a src/ (su cluster meglio path assoluto via override)
  output_dir:  "experiments/logs"
  checkpoint:  "experiments/checkpoints"

#data_root: /shared/data/pytorch
#output_dir: ./experiments/logs/

# --- Dataset -----------------------------------------------------------------
data:
  batch_size:  8
  num_workers: 4                     # su K80 tieni basso; su L40S puoi alzare
  pin_memory:  true

# --- Architettura ------------------------------------------------------------
model:
  encoder:       "handcrafted"        # Opzioni: r3d_18, r2plus1d_18, handcrafted, mc3_18, s3d, x3d_s
  pretrained:    false                # ATTENZIONE: richiede download pesi o cache (fondamentale per evitare overfitting)
  temperature:   0.1                  # τ ensemble semantico
  ema_momentum:  0.99                 # EMA centroidi (più stabile con batch piccoli)
  dropout:       0.5

# --- Training ----------------------------------------------------------------
training:
  max_epochs:    30
  patience:      10
  learning_rate: 1.0e-4
  weight_decay:  1.0e-4
  lambda_pseudo: 0.1
  lambda_adv: 0.2  # peso della loss avversariale
  warmup_epochs: 5
  lambda_em: 0.1
  # il modello allineera' i domini nel feature space

  # lambda_adv: 0.0  per spegnere la Domain Adaptation e avere il puro Zero-Shot Baseline
  # il modello addestrerà solo le teste di classificazione condivise e farà test zero-shot su Kinetics

# --- Cluster / Hardware ------------------------------------------------------
hardware:
  precision:     "fp32"              # fp32 su K80; bfloat16 su L40S (gnode10)
  seed:          42

# --- Logging -----------------------------------------------------------------
logging:
  wandb_mode:    "offline"           # nodi senza internet
  project:       "multi-source-da"
  run_name:      "baseline"